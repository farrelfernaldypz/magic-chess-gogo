  <line class="axis" x1="260" y1="318" x2="1024" y2="318"/>
  <line class="grid" x1="451.0" y1="108" x2="451.0" y2="318"/>
  <line class="grid" x1="642.0" y1="108" x2="642.0" y2="318"/>
  <line class="grid" x1="833.0" y1="108" x2="833.0" y2="318"/>
  <line class="grid" x1="1024.0" y1="108" x2="1024.0" y2="318"/>
  <text class="label" x="246" y="139" text-anchor="end">Carry</text>
  <rect x="260" y="122" width="764.0" height="24" rx="8" fill="#278dff"/>
  <text class="value" x="1034.0" y="139">25</text>
  <text class="label" x="246" y="176" text-anchor="end">Tank</text>
  <rect x="260" y="159" width="336.2" height="24" rx="8" fill="#35d598"/>
  <text class="value" x="606.2" y="176">11</text>
  <text class="label" x="246" y="213" text-anchor="end">Flex</text>
  <rect x="260" y="196" width="244.5" height="24" rx="8" fill="#ffc84f"/>
  <text class="value" x="514.5" y="213">8</text>
  <text class="label" x="246" y="250" text-anchor="end">Fighter</text>
  <rect x="260" y="233" width="152.8" height="24" rx="8" fill="#ff70b8"/>
  <text class="value" x="422.8" y="250">5</text>
  <text class="label" x="246" y="287" text-anchor="end">Support</text>
  <rect x="260" y="270" width="91.7" height="24" rx="8" fill="#8b5cf6"/>
